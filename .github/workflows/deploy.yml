name: deploy
on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/ibcoleman/districtlive-server
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm -F districtlive-server-frontend build

      - name: Build app binary
        run: bazel build //:app

      - name: Copy binary to workspace root
        run: cp bazel-bin/app ./app

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v3
        with:
          version: '5.8.1'

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tag in kustomization
        working-directory: k8s/overlays/staging
        run: |
          kustomize edit set image \
            districtlive-server=${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Deploy to staging
        run: kubectl apply -k k8s/overlays/staging -n districtlive-server

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/districtlive-server \
            -n districtlive-server --timeout=300s
