<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rhizome DC - New Events</title>
</head>
<body>

<div class="eventlist">

    <!-- Event 1: Deep House Sessions — full fields, end time, ticket URL -->
    <article class="eventlist-event--upcoming">
        <h1 class="eventlist-title">
            <a class="eventlist-title-link" href="/new-events/deep-house-sessions">Deep House Sessions</a>
        </h1>
        <div class="eventlist-meta">
            <time class="event-date" datetime="2026-03-20">March 20, 2026</time>
            <span class="event-time-12hr">
                <time class="event-time-12hr-start">9:00 PM</time>
                <time class="event-time-12hr-end">11:00 PM</time>
            </span>
        </div>
        <div class="eventlist-media">
            <img class="eventlist-thumbnail" data-src="https://example.com/deep-house.jpg" alt="Deep House Sessions">
        </div>
        <div class="eventlist-excerpt">
            <p>$20 admission. An immersive evening of deep house and techno music.</p>
            <a href="https://www.eventbrite.com/rhizome-deep-house">Buy Tickets</a>
        </div>
    </article>

    <!-- Event 2: Afrobeats Showcase — single price, no external ticket, data-src image -->
    <article class="eventlist-event--upcoming">
        <h1 class="eventlist-title">
            <a class="eventlist-title-link" href="/new-events/afrobeats-showcase">Afrobeats Showcase</a>
        </h1>
        <div class="eventlist-meta">
            <time class="event-date" datetime="2026-03-27">March 27, 2026</time>
            <span class="event-time-12hr">
                <time class="event-time-12hr-start">8:00 PM</time>
            </span>
        </div>
        <div class="eventlist-media">
            <img class="eventlist-thumbnail" data-src="https://example.com/afrobeats-showcase.jpg" alt="Afrobeats Showcase">
        </div>
        <div class="eventlist-excerpt">
            <p>$15 suggested donation. Celebrating African electronic and contemporary sounds.</p>
        </div>
    </article>

</div>

</body>
</html>
